<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="EuroMillions" />
  <meta name="theme-color" content="#f6f1e6" />
  <title>EuroMillions Results</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f6f1e6;   /* warm cream — easier on aged eyes than pure white */
      --card:      #ffffff;
      --card-shadow: 0 2px 8px rgba(35, 25, 10, 0.08);
      --border:    #d8cfb8;
      --gold:      #b45309;   /* dark amber — readable headline colour on cream */
      --gold-dim:  #92400e;
      --gold-fill: #f5b700;   /* still bright on the lottery balls */
      --star-bg:   #1d4ed8;
      --star-text: #ffffff;
      --ball-bg:   #fcd34d;
      --ball-text: #1a1a1a;
      --text:      #1a1a1a;
      --text-soft: #2d2d2d;
      --muted:     #6b6357;
      --error:     #b91c1c;
      --warn-bg:     #fef3c7;
      --warn-border: #d97706;
      --warn-text:   #78350f;
      --success-bg: #fff4d2;
      --success-bd: #d4a017;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* LOADING */
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; gap: 28px; padding: 40px 24px; text-align: center;
    }
    .loading-title { font-size: clamp(26px, 6vw, 32px); font-weight: 900; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
    .spinner { width: 64px; height: 64px; border: 6px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loading-label { font-size: 22px; font-weight: 700; color: var(--text); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* ERROR */
    #error { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 20px; padding: 40px 24px; text-align: center; }
    .error-icon  { font-size: 56px; }
    .error-title { font-size: 24px; font-weight: 900; color: var(--error); text-transform: uppercase; letter-spacing: 1px; }
    .error-msg   { font-size: 18px; font-weight: 700; color: var(--text-soft); line-height: 1.5; }
    .retry-btn   { margin-top: 8px; padding: 16px 40px; background: var(--gold-fill); color: #1a1a1a; border: 2px solid var(--gold); border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 19px; font-weight: 900; cursor: pointer; letter-spacing: 1px; }

    /* RESULTS */
    #results { display: none; flex-direction: column; flex: 1; }

    .app-header { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 22px 0 16px; }
    .app-header-icon  { font-size: 30px; color: var(--gold); }
    .app-header-title { font-size: clamp(22px, 5vw, 26px); font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }

    hr.divider { border: none; border-top: 2px solid var(--border); margin: 0 0 18px; }

    /* DRAW-WINDOW WARNING BANNER */
    .draw-banner {
      display: none;
      background: var(--warn-bg);
      color: var(--warn-text);
      border: 2px solid var(--warn-border);
      border-radius: 14px;
      padding: 16px 18px;
      margin: 0 0 18px;
      font-size: clamp(16px, 4.2vw, 19px);
      font-weight: 800;
      line-height: 1.4;
      text-align: center;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(245, 158, 11, 0.25);
      animation: bannerPulse 2.4s ease-in-out infinite;
    }
    @keyframes bannerPulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(245, 158, 11, 0.25); }
      50%      { box-shadow: 0 4px 22px rgba(245, 158, 11, 0.5); }
    }

    .draw-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 14px;
      margin-bottom: 22px;        /* roomy spacing between cards */
      box-shadow: var(--card-shadow);
    }
    .draw-card.latest {
      border: 3px solid var(--gold);
      padding: 22px 14px;
      margin-bottom: 26px;
      box-shadow: 0 6px 22px rgba(180, 83, 9, 0.18);
    }
    #results { padding: 0 14px 24px; }

    .draw-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .draw-badge {
      font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
      color: #1a1a1a; background: var(--gold-fill); padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--gold-dim);
    }
    .draw-date  { font-size: clamp(17px, 4.4vw, 20px); font-weight: 800; color: var(--text); }
    .latest .draw-date { font-size: clamp(19px, 5vw, 22px); }

    /* Balls are forced onto one line. Sizing is tuned so the row (5 numbers +
       separator + 2 stars) fits on an iPhone 11 (414px) and an iPhone SE/12-mini
       (375px) without wrapping. Card padding eats the rest of the viewport. */
    .balls-row {
      display: flex;
      gap: 5px;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 14px;
      width: 100%;
    }
    .ball, .star { display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 900; flex: 0 0 auto; }

    .latest .ball {
      width: clamp(36px, 10.4vw, 56px); height: clamp(36px, 10.4vw, 56px);
      font-size: clamp(15px, 4.4vw, 22px);
      background: var(--ball-bg); color: var(--ball-text);
      border: 2px solid var(--gold-dim);
      box-shadow: 0 3px 8px rgba(180, 83, 9, 0.22);
    }
    .latest .star {
      width: clamp(36px, 10.4vw, 56px); height: clamp(36px, 10.4vw, 56px);
      font-size: clamp(13px, 4vw, 19px);
      background: var(--star-bg); color: var(--star-text);
      box-shadow: 0 3px 8px rgba(29, 78, 216, 0.28);
    }
    .prev .ball {
      width: clamp(32px, 9.2vw, 46px); height: clamp(32px, 9.2vw, 46px);
      font-size: clamp(13px, 3.8vw, 18px);
      background: var(--ball-bg); color: var(--ball-text);
      border: 1px solid var(--gold-dim);
    }
    .prev .star {
      width: clamp(32px, 9.2vw, 46px); height: clamp(32px, 9.2vw, 46px);
      font-size: clamp(11px, 3.4vw, 16px);
      background: var(--star-bg); color: var(--star-text);
    }
    .star-separator {
      font-size: 18px; color: var(--muted); margin: 0 2px;
      flex: 0 0 auto; font-weight: 900;
    }

    .jackpot-row    { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .jackpot-label  { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
    .jackpot-amount { font-size: clamp(24px, 6.4vw, 30px); font-weight: 900; color: var(--gold); letter-spacing: 0.5px; }
    .latest .jackpot-amount { font-size: clamp(28px, 7.5vw, 34px); }

    .section-heading {
      font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px;
      color: var(--muted); margin: 18px 4px 14px;
    }

    /* NEXT JACKPOT CARD — hero element above all results */
    .next-jackpot {
      display: none;
      background: linear-gradient(135deg, #fff8e1 0%, #ffeaa1 100%);
      border: 3px solid var(--gold);
      border-radius: 22px;
      padding: 22px 18px;
      margin: 0 0 22px;
      text-align: center;
      box-shadow: 0 6px 22px rgba(180, 83, 9, 0.22);
    }
    .next-jackpot-label  {
      font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px;
      color: var(--gold-dim); margin-bottom: 8px;
    }
    .next-jackpot-amount {
      font-size: clamp(40px, 11vw, 56px); font-weight: 900; color: var(--gold);
      letter-spacing: 0.5px; line-height: 1.05;
    }
    .next-jackpot-rollover {
      display: none;
      margin-top: 10px;
      font-size: clamp(15px, 3.8vw, 17px);
      font-weight: 800;
      color: var(--gold-dim);
      letter-spacing: 0.5px;
    }
    .next-jackpot-rollover.show { display: block; }
    .next-jackpot-rollover strong { color: var(--error); font-weight: 900; }

    /* DRAW DETAILS (collapsible) */
    .draw-details { margin-top: 14px; border-top: 1px solid var(--border); }
    .draw-details > summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 4px 6px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .draw-details > summary::-webkit-details-marker { display: none; }
    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
    }
    .summary-row::after {
      content: '▾';
      font-size: 16px;
      color: var(--muted);
      transition: transform 0.18s ease;
    }
    .draw-details[open] .summary-row::after { transform: rotate(180deg); }
    .winner-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .winner-pill.yes { background: var(--success-bg); color: var(--gold-dim); border: 1.5px solid var(--success-bd); }
    .winner-pill.no  { background: #f3eee0; color: var(--muted); border: 1.5px solid var(--border); }
    .prize-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    .prize-table th, .prize-table td {
      padding: 8px 6px;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    .prize-table th { color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
    .prize-table td { color: var(--text); }
    .prize-table td:first-child, .prize-table th:first-child { text-align: left; }
    .prize-table tr:last-child td { border-bottom: none; }
    .prize-tier-jackpot td { color: var(--gold); font-weight: 900; }

    .app-footer { margin-top: auto; padding: 14px 4px 4px; display: flex; flex-direction: column; gap: 4px; }
    .footer-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .footer-text { font-size: 13px; color: var(--muted); font-weight: 700; }
    .footer-next { font-size: 13px; color: var(--muted); font-weight: 700; text-align: right; }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div id="loading">
    <div class="loading-title">EuroMillions</div>
    <div class="spinner"></div>
    <div class="loading-label">Loading latest results...</div>
  </div>

  <!-- ERROR -->
  <div id="error">
    <div class="error-icon">!</div>
    <div class="error-title">Could Not Load Results</div>
    <div class="error-msg" id="error-msg">Please check your internet connection and try again.</div>
    <button class="retry-btn" onclick="loadData(true)">Try Again</button>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="app-header">
      <span class="app-header-icon">*</span>
      <span class="app-header-title">EuroMillions</span>
    </div>
    <hr class="divider" />
    <div id="draw-banner" class="draw-banner" role="alert" aria-live="polite">
      Tonight's draw is happening now &mdash; these results may not be the latest yet.
    </div>
    <div id="next-jackpot" class="next-jackpot">
      <div class="next-jackpot-label" id="next-jackpot-label">Next Draw</div>
      <div class="next-jackpot-amount" id="next-jackpot-amount"></div>
      <div class="next-jackpot-rollover" id="next-jackpot-rollover"></div>
    </div>
    <div id="draws-container"></div>
    <div class="app-footer">
      <div class="footer-row">
        <div class="footer-text" id="footer-fetched"></div>
        <div class="footer-next"  id="footer-next"></div>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.warn);
    }

    const LS_DATA  = 'em_draws_v2';
    const LS_UNTIL = 'em_draws_until_v2';
    const LS_JACKPOT = 'em_jackpot_v2';
    const LS_FX = 'em_eurgbp_v1';

    // Conservative fallback so the UI never shows a confusing EUR figure to a
    // GBP audience if the live FX lookup is briefly unavailable.
    const FX_FALLBACK = 0.86;
    let FX = Number(localStorage.getItem(LS_FX)) || FX_FALLBACK;

    function renderJackpot(jackpot) {
      if (!jackpot || !jackpot.amount) return;
      const card  = document.getElementById('next-jackpot');
      const label = document.getElementById('next-jackpot-label');
      const amt   = document.getElementById('next-jackpot-amount');
      label.textContent = jackpot.day ? `This ${jackpot.day}` : 'Next Draw';
      amt.textContent   = jackpot.amount;
      card.style.display = 'block';
    }

    function renderRollover(streak) {
      const el = document.getElementById('next-jackpot-rollover');
      if (!el) return;
      if (streak >= 2) {
        // Two draws per week (Tue + Fri) so weeks ≈ streak / 2
        const weeks = Math.max(1, Math.round(streak / 2));
        const noun  = weeks === 1 ? 'week' : 'weeks';
        el.innerHTML = `<strong>${streak}-draw rollover</strong> &middot; ~${weeks} ${noun} unwon`;
        el.classList.add('show');
      } else if (streak === 1) {
        el.innerHTML = `Rolled over from last draw`;
        el.classList.add('show');
      } else {
        el.classList.remove('show');
        el.textContent = '';
      }
    }

    async function loadJackpot() {
      try {
        const cachedRaw = localStorage.getItem(LS_JACKPOT);
        if (cachedRaw) {
          const cached = JSON.parse(cachedRaw);
          if (cached && cached.cache_until && new Date(cached.cache_until) > new Date()) {
            renderJackpot(cached);
            return;
          }
        }
      } catch (_) { /* ignore parse errors */ }

      try {
        const r = await fetch('/api/jackpot');
        if (!r.ok) return;
        const data = await r.json();
        if (data.error || !data.amount) return;
        localStorage.setItem(LS_JACKPOT, JSON.stringify(data));
        renderJackpot(data);
      } catch (err) {
        console.warn('Jackpot fetch failed (non-fatal):', err);
      }
    }

    function getCached() {
      try {
        const until = localStorage.getItem(LS_UNTIL);
        if (until && Date.now() < Number(until)) {
          const raw = localStorage.getItem(LS_DATA);
          if (raw) return JSON.parse(raw);
        }
      } catch (_) {}
      return null;
    }

    function setCached(draws, cacheUntilISO) {
      try {
        localStorage.setItem(LS_DATA,  JSON.stringify(draws));
        localStorage.setItem(LS_UNTIL, String(new Date(cacheUntilISO).getTime()));
      } catch (_) {}
    }

    function show(id) {
      ['loading', 'error', 'results'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'flex' : 'none';
      });
    }

    function getNumbers(d) {
      if (d.numbers && Array.isArray(d.numbers) && d.numbers.length)
        return d.numbers.map(Number).sort((a, b) => a - b);
      return [d.number_1, d.number_2, d.number_3, d.number_4, d.number_5]
        .filter(n => n != null).map(Number).sort((a, b) => a - b);
    }

    function getStars(d) {
      if (d.lucky_stars && Array.isArray(d.lucky_stars) && d.lucky_stars.length)
        return d.lucky_stars.map(Number).sort((a, b) => a - b);
      if (d.stars && Array.isArray(d.stars) && d.stars.length)
        return d.stars.map(Number).sort((a, b) => a - b);
      return [d.star_1, d.star_2].filter(n => n != null).map(Number).sort((a, b) => a - b);
    }

    function parseDraws(data) {
      console.log('Raw API response:', JSON.stringify(data, null, 2));
      let raw = [];
      if (Array.isArray(data))              raw = data;
      else if (Array.isArray(data.data))    raw = data.data;
      else if (Array.isArray(data.draws))   raw = data.draws;
      else if (Array.isArray(data.results)) raw = data.results;
      else throw new Error('Unrecognised API response format. Check the browser console.');

      return raw
        .map(d => ({
          date:       d.date,
          numbers:    getNumbers(d),
          stars:      getStars(d),
          jackpot:    d.jackpot != null ? Number(d.jackpot) : null,
          has_winner: typeof d.has_winner === 'boolean' ? d.has_winner : null,
          prizes:     Array.isArray(d.prizes) ? d.prizes : null,
        }))
        .filter(d => d.numbers.length === 5)
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .slice(0, 9);
    }

    // Count consecutive most-recent draws with no jackpot winner. The user is
    // especially interested in multi-week rollovers, so this drives the badge
    // shown on the jackpot card.
    function rolloverStreak(draws) {
      let n = 0;
      for (const d of draws) {
        if (d.has_winner === false) n++;
        else break;
      }
      return n;
    }

    function formatDate(s) {
      return new Date(s + 'T12:00:00').toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function formatDateShort(s) {
      return new Date(s + 'T12:00:00').toLocaleDateString('en-GB', {
        weekday: 'short', day: 'numeric', month: 'short'
      });
    }

    function formatJackpot(eur) {
      if (!eur || eur <= 0) return null;
      const gbp = eur * FX;
      const m = gbp / 1_000_000;
      return m >= 1
        ? `£${m % 1 === 0 ? m : m.toFixed(1)} Million`
        : `£${Math.round(gbp / 1000)}K`;
    }

    function formatNextUpdate(isoString) {
      const d = new Date(isoString);
      const day  = d.toLocaleDateString('en-GB', { weekday: 'long' });
      const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      return `Next update: ${day} ~${time}`;
    }

    function renderBalls(numbers, stars, isLatest) {
      const cls = isLatest ? 'latest' : 'prev';
      return `
        <div class="balls-row ${cls}">
          ${numbers.map(n => `<div class="ball">${n}</div>`).join('')}
          <span class="star-separator">|</span>
          ${stars.map(s => `<div class="star">★${s}</div>`).join('')}
        </div>`;
    }

    function formatPrize(eur) {
      if (eur == null) return '—';
      const gbp = Number(eur) * FX;
      if (gbp >= 1_000_000) return `£${(gbp / 1_000_000).toFixed(2)}M`;
      if (gbp >= 1_000)     return `£${(gbp / 1_000).toFixed(1)}K`;
      return `£${gbp.toFixed(2)}`;
    }

    function formatWinners(n) {
      if (n == null) return '—';
      return Number(n).toLocaleString('en-GB');
    }

    function renderPrizeTable(prizes) {
      const sorted = [...prizes].sort((a, b) => {
        const score = p => (p.matched_numbers || 0) * 10 + (p.matched_stars || 0);
        return score(b) - score(a);
      });
      const rows = sorted.map(p => {
        const isJackpot = p.matched_numbers === 5 && p.matched_stars === 2;
        const tier = `${p.matched_numbers}+${p.matched_stars}★`;
        return `<tr class="${isJackpot ? 'prize-tier-jackpot' : ''}">
          <td>${tier}</td>
          <td>${formatPrize(p.prize)}</td>
          <td>${formatWinners(p.winners)}</td>
        </tr>`;
      }).join('');
      return `
        <table class="prize-table">
          <thead><tr><th>Tier</th><th>Prize</th><th>Winners</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function renderWinnerPill(hasWinner) {
      if (hasWinner === true)  return '<span class="winner-pill yes">★ Jackpot Won</span>';
      if (hasWinner === false) return '<span class="winner-pill no">Rollover</span>';
      return '';
    }

    function renderDetails(draw) {
      if (!draw.prizes || !draw.prizes.length) return '';
      return `
        <details class="draw-details">
          <summary><div class="summary-row"><span>Prize Breakdown</span></div></summary>
          ${renderPrizeTable(draw.prizes)}
        </details>`;
    }

    function renderDraw(draw, index) {
      const isLatest = index === 0;
      const jackpot  = formatJackpot(draw.jackpot);
      return `
        <div class="draw-card ${isLatest ? 'latest' : 'prev'}">
          <div class="draw-meta">
            ${isLatest ? '<span class="draw-badge">Latest Draw</span>' : ''}
            <span class="draw-date">${isLatest ? formatDate(draw.date) : formatDateShort(draw.date)}</span>
            ${renderWinnerPill(draw.has_winner)}
          </div>
          ${renderBalls(draw.numbers, draw.stars, isLatest)}
          ${jackpot ? `<div class="jackpot-row">
            <span class="jackpot-label">Jackpot</span>
            <span class="jackpot-amount">${jackpot}</span>
          </div>` : ''}
          ${renderDetails(draw)}
        </div>`;
    }

    function renderResults(draws, cacheUntil, fromCache) {
      const container = document.getElementById('draws-container');
      let html = renderDraw(draws[0], 0);
      if (draws.length > 1) {
        html += `<div class="section-heading">Previous Draws</div>`;
        draws.slice(1).forEach((d, i) => { html += renderDraw(d, i + 1); });
      }
      container.innerHTML = html;

      renderRollover(rolloverStreak(draws));

      document.getElementById('footer-fetched').textContent = fromCache ? 'Cached results' : 'Just updated';
      document.getElementById('footer-next').textContent =
        cacheUntil ? formatNextUpdate(cacheUntil) : 'Draws: Tue & Fri';
    }

    async function loadData(forceRefresh = false) {
      if (!forceRefresh) {
        const cached = getCached();
        if (cached) {
          const until = localStorage.getItem(LS_UNTIL);
          renderResults(cached, until ? new Date(Number(until)).toISOString() : null, true);
          show('results');
          updateDrawBanner();
          return;
        }
      }

      show('loading');

      try {
        const response = await fetch('/api/draws');
        if (!response.ok) throw new Error(`Server error ${response.status}.`);

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        if (data.gbp_rate && Number.isFinite(data.gbp_rate) && data.gbp_rate > 0) {
          FX = data.gbp_rate;
          localStorage.setItem(LS_FX, String(FX));
        }

        const draws = parseDraws(data);
        if (!draws.length) throw new Error('No draw data was returned. Try again in a few minutes.');

        setCached(draws, data.cache_until);
        renderResults(draws, data.cache_until, false);
        show('results');
        updateDrawBanner();

      } catch (err) {
        console.error('Failed to load EuroMillions data:', err);

        const stale = (() => {
          try { return JSON.parse(localStorage.getItem(LS_DATA)); } catch (_) { return null; }
        })();
        if (stale && stale.length) {
          renderResults(stale, null, true);
          document.getElementById('footer-fetched').textContent = 'Showing cached data (offline?)';
          show('results');
          updateDrawBanner();
          return;
        }

        document.getElementById('error-msg').textContent = err.message;
        show('error');
      }
    }

    /* ---------------------------------------------------------------------- *
     * DRAW-WINDOW WATCHER
     *
     * While the app is open we want to:
     *   1. Auto-refresh the cache the moment it expires (so the user never has
     *      to close and reopen the app to see new results).
     *   2. Show a friendly amber banner during the draw window
     *      (Tue/Fri 20:15-20:45 UTC) IF the cached "latest draw" is not from
     *      today, i.e. tonight's result hasn't landed yet.
     *
     * Outside the draw window: no banner, no polling. We schedule a one-shot
     * timer that wakes the watcher up at the start of the next window.
     * ---------------------------------------------------------------------- */

    const DRAW_WINDOW_START_MIN = 20 * 60 + 15;  // 20:15 UTC
    const DRAW_WINDOW_END_MIN   = 20 * 60 + 45;  // 20:45 UTC
    const POLL_INTERVAL_MS      = 30 * 1000;

    let drawWindowInterval     = null;
    let drawWindowStartTimeout = null;

    function isDrawDay(date) {
      const day = date.getUTCDay(); // 2 = Tue, 5 = Fri
      return day === 2 || day === 5;
    }

    function isInDrawWindow(now = new Date()) {
      if (!isDrawDay(now)) return false;
      const minutes = now.getUTCMinutes() + now.getUTCHours() * 60;
      return minutes >= DRAW_WINDOW_START_MIN && minutes < DRAW_WINDOW_END_MIN;
    }

    function nextDrawWindowStart(from = new Date()) {
      for (let i = 0; i <= 8; i++) {
        const d = new Date(from);
        d.setUTCDate(from.getUTCDate() + i);
        d.setUTCHours(20, 15, 0, 0);
        if (isDrawDay(d) && d > from) return d;
      }
      return null;
    }

    function todayUTCDateString() {
      return new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    }

    function readCachedDraws() {
      try { return JSON.parse(localStorage.getItem(LS_DATA)); }
      catch (_) { return null; }
    }

    function setBanner(visible) {
      const banner = document.getElementById('draw-banner');
      if (!banner) return;
      banner.style.display = visible ? 'block' : 'none';
    }

    function updateDrawBanner() {
      if (!isInDrawWindow()) { setBanner(false); return; }
      const cached = readCachedDraws();
      if (!cached || !cached.length) { setBanner(false); return; }

      const latestDate = String(cached[0].date).slice(0, 10);
      const today      = todayUTCDateString();

      // Show the banner only if cached "latest" is not today's draw yet.
      setBanner(latestDate !== today);
    }

    function tickDrawWatcher() {
      // 1. Cache expired? Auto-refresh in the background.
      const untilRaw = localStorage.getItem(LS_UNTIL);
      const until    = untilRaw ? Number(untilRaw) : 0;
      if (until && Date.now() > until) {
        loadData(true); // re-render will update the banner state
        return;
      }

      // 2. Inside the window: keep the banner state in sync with the cache.
      if (isInDrawWindow()) {
        updateDrawBanner();
        return;
      }

      // 3. Outside the window: hide banner, stop polling, schedule next start.
      setBanner(false);
      stopDrawWindowPolling();
      scheduleDrawWindowStart();
    }

    function startDrawWindowPolling() {
      if (drawWindowInterval) return;
      drawWindowInterval = setInterval(tickDrawWatcher, POLL_INTERVAL_MS);
      tickDrawWatcher(); // run once immediately
    }

    function stopDrawWindowPolling() {
      if (drawWindowInterval) {
        clearInterval(drawWindowInterval);
        drawWindowInterval = null;
      }
    }

    function scheduleDrawWindowStart() {
      if (drawWindowStartTimeout) {
        clearTimeout(drawWindowStartTimeout);
        drawWindowStartTimeout = null;
      }
      const next = nextDrawWindowStart();
      if (!next) return;
      const ms = Math.max(0, next.getTime() - Date.now());
      drawWindowStartTimeout = setTimeout(() => {
        drawWindowStartTimeout = null;
        startDrawWindowPolling();
      }, ms);
    }

    function initDrawWatcher() {
      if (isInDrawWindow()) startDrawWindowPolling();
      else                  scheduleDrawWindowStart();
    }

    // If iOS suspends the page in the background and re-shows it, re-evaluate
    // immediately so the banner / cache state is in sync with reality.
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible') return;
      const until = Number(localStorage.getItem(LS_UNTIL) || 0);
      if (until && Date.now() > until) {
        loadData(true);
      } else {
        updateDrawBanner();
      }
      loadJackpot();
      stopDrawWindowPolling();
      if (drawWindowStartTimeout) { clearTimeout(drawWindowStartTimeout); drawWindowStartTimeout = null; }
      initDrawWatcher();
    });

    loadData();
    loadJackpot();
    initDrawWatcher();
  </script>
</body>
</html>
